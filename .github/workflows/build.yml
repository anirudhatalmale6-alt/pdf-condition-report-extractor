name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PyMuPDF pdfplumber Pillow requests pyinstaller

      - name: Build (one-folder)
        run: |
          pyinstaller orbas.spec --clean --noconfirm

      - name: Zip the app folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ORBAS/* -DestinationPath ORBAS-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ORBAS-Windows
          path: ORBAS-Windows.zip
